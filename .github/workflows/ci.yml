name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.10, 3.11, 3.12, 3.13, 3.14]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install black flake8 mypy pytest || true

      - name: Lint: black
        run: black --check . || true

      - name: Lint: flake8
        run: flake8 . || true

      - name: Type check
        run: mypy src || true

      - name: Install Playwright browsers (if Playwright is present)
        run: |
          python - <<'PY'
          import importlib, sys, subprocess
          if importlib.util.find_spec('playwright') is None:
              print('Playwright not found, skipping browser install')
              sys.exit(0)
          subprocess.check_call([sys.executable, '-m', 'playwright', 'install', '--with-deps'])
          PY

      - name: Run tests
        run: pytest -q
